services:

  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: aryan
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: url_shortner
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  kafka:
    image: apache/kafka:latest
    container_name: kafka_kraft
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qo
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1


  analytics_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/analytics/analyticsWorker.js"]

    environment:
      - DATABASE_URL=postgresql://aryan:${POSTGRES_PASSWORD}@db:5432/url_shortner
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      - db
      - kafka
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url_shortner
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: postgresql://aryan:${POSTGRES_PASSWORD}@db:5432/url_shortner
      PORT: 3000
      KAFKA_BROKERS: kafka:9092
    ports: 
       - "3000:3000"
    depends_on:
      - db
      - redis
      - kafka

volumes:
  postgres_data:
  redis_data:
    driver: local
  kafka_data:
    driver: local